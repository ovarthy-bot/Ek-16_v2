name: Expo Web'i GitHub Pages'a Yayınla

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v6

      - name: Node.js kur
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Expo web çıktısını oluştur
        run: npm run predeploy

      - name: GitHub Pages'i yapılandır
        uses: actions/configure-pages@v5

      - name: Web çıktısını yükle
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages'a yayınla
        id: deployment
        uses: actions/deploy-pages@v4
